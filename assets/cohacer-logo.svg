<svg xmlns="http://www.w3.org/2000/svg" width="220" height="56" viewBox="0 0 220 56" role="img" aria-labelledby="logo-title logo-desc">
<title id="logo-title">COHACER</title><desc id="logo-desc">Logo institucional de COHACER</desc>
<rect width="220" height="56" fill="none"/>
<!-- Icono circular estilizado -->
<g transform="translate(6, 4)">
  <!-- Arco superior gris -->
  <path d="M24 2C11.3 2 1 12.3 1 25c0 5.8 2.2 11.1 5.7 15.2" fill="none" stroke="#8c8880" stroke-width="7" stroke-linecap="round"/>
  <!-- Arco inferior oro -->
  <path d="M42.3 39.8C38.2 43.5 32.9 46 24 46c-2.5 0-5-.4-7.3-1" fill="none" stroke="#876b3f" stroke-width="7" stroke-linecap="round"/>
  <!-- Arco derecho navy -->
  <path d="M43.5 11C46 15.3 47 19.9 47 25c0 5.6-1.7 10.8-4.7 15" fill="none" stroke="#151d33" stroke-width="7" stroke-linecap="round"/>
  <!-- Punto acento amarillo -->
  <circle cx="38" cy="7" r="5" fill="#ffc629"/>
</g>
<!-- Texto COHACER -->
<text x="62" y="30" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#151d33" letter-spacing="0.5">COHACER</text>
<text x="63" y="45" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="#876b3f">Tu aprendizaje, tu futuro.</text>
</svg>
